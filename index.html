<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GMarket - Золотой Маркетплейс</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="logo">GMarket</div>
        <nav class="nav-buttons">
            <a href="#" class="nav-btn">GMarket</a>
            <a href="#" class="nav-btn">Продать</a>
            <a href="#" class="nav-btn">Чаты</a>
            <a href="#" class="nav-btn">Личный кабинет</a>
        </nav>
    </header>
    <!-- Основное содержимое -->
    <main class="site-content">
        <h1>Добро пожаловать на GMarket</h1>
        <p>Ваш надежный помощник в мире онлайн-торговли. Здесь вы найдете лучшие товары по выгодным ценам.</p>
        <!-- Здесь будут размещаться карточки товаров -->
        <div class="product-grid">
            <div class="product-card">
                <img src="https://via.placeholder.com/250x150" alt="Товар 1">
                <h3>Название товара 1</h3>
                <p>Цена: 10 000 ₽</p>
            </div>
            <div class="product-card">
                <img src="https://via.placeholder.com/250x150" alt="Товар 2">
                <h3>Название товара 2</h3>
                <p>Цена: 15 000 ₽</p>
            </div>
            <!-- Добавьте больше карточек по аналогии -->
        </div>
    </main>
    <!-- Подвал сайта -->
    <footer class="site-footer">
        <p>&copy; 2026 GMarket. Все права защищены.</p>
    </footer>
</body>
</html>
